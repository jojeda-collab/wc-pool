<!--
 WORLD CUP 2026 BRACKET CHALLENGE (FIFA-style prediction game)
 Players predict: group standings -> 8 best thirds -> full knockout bracket.
 Locked at kickoff, then scored against real results entered by the organizer.
 LOCAL mode runs immediately; Firebase config below enables live multiplayer.
 Firebase: console.firebase.google.com -> Realtime Database (test mode) ->
   Rules { "rules": { ".read": true, ".write": true } } -> paste config below.
 Pools: add #code to the URL.  Flags: flagcdn.com (falls back to a code).
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap');
  :root{--bg:#0a3491;--panel:#fff;--panel2:#eef3ff;--line:#d3ddf1;--ink:#0d2c66;--muted:#77849e;--gold:#f3c012;--coral:#d8232a;--blue:#0a47a6;--onblue:#cdd9f5;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:#0a3491;}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;background:linear-gradient(168deg,#08296f 0%,#0a3491 45%,#0c3ea8 100%);background-attachment:fixed;min-height:100vh;}
  .anton{font-family:'Anton',sans-serif;letter-spacing:.01em;}
  .mono{font-family:'Space Mono',monospace;}
  input,select{font-family:'Hanken Grotesk',sans-serif;border-radius:10px;}
  ::placeholder{color:#b3ab97;}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
  @keyframes pop{0%{transform:scale(.85)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .rise{animation:rise .4s cubic-bezier(.2,.7,.2,1) both;}
  .btn{cursor:pointer;border:none;font-weight:800;border-radius:11px;transition:transform .12s,filter .12s;}
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn:disabled{cursor:default;}
  .card{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;box-shadow:0 2px 10px rgba(21,35,63,.05);}
  .flag{object-fit:cover;border-radius:3px;flex-shrink:0;box-shadow:0 0 0 1px rgba(21,35,63,.14),0 1px 2px rgba(21,35,63,.18);background:#eee;}
  .stripe{height:5px;background:linear-gradient(90deg,#f3c012 0%,#f3c012 50%,#0a47a6 50%,#0a47a6 75%,#d8232a 75%,#d8232a 100%);}
  #root{min-height:100vh;}
  .boot{min-height:100vh;display:grid;place-items:center;color:var(--gold);}
  /* bracket tree */
  .bk{display:flex;overflow-x:auto;align-items:stretch;padding:4px 2px 16px;}
  .bk-rd{display:flex;flex-direction:column;min-width:150px;padding-right:18px;}
  .bk-rd-h{font-family:'Anton',sans-serif;font-size:13px;color:var(--ink);text-align:center;padding:6px 0;position:sticky;top:0;}
  .bk-rd-b{flex:1;display:flex;flex-direction:column;justify-content:space-around;}
  .bk-m{position:relative;margin:6px 0;}
  .bk-rd:not(:last-child) .bk-m::after{content:'';position:absolute;top:50%;right:-18px;width:18px;height:2px;background:var(--line);}
</style>

/* real standings from organizer-entered group scores */
function standingsFor(L,results){const ts=GROUPS[L];const row={};ts.forEach(t=>row[t]={team:t,Pts:0,GF:0,GA:0,GD:0});let played=0;
  GROUP_MATCHES.filter(m=>m.group===L).forEach(m=>{const r=results[m.id];if(!r||r.hs==null)return;played++;const h=row[m.home],a=row[m.away];h.GF+=r.hs;h.GA+=r.as;a.GF+=r.as;a.GA+=r.hs;if(r.hs>r.as)h.Pts+=3;else if(r.hs<r.as)a.Pts+=3;else{h.Pts++;a.Pts++;}});
  ts.forEach(t=>row[t].GD=row[t].GF-row[t].GA);
  const ordered=ts.map(t=>row[t]).sort((x,y)=>y.Pts-x.Pts||y.GD-x.GD||y.GF-x.GF||x.team.localeCompare(y.team));
  return {ordered,complete:played===6};}
function allStandings(results){const o={};GLETTERS.forEach(L=>o[L]=standingsFor(L,results));return o;}
function realThirdGroups(st){const arr=GLETTERS.map(L=>({L,row:st[L].ordered[2],ok:st[L].complete}));const ranked=[...arr].sort((a,b)=>b.row.Pts-a.row.Pts||b.row.GD-a.row.GD||b.row.GF-a.row.GF);return new Set(ranked.slice(0,8).map(x=>x.L));}

/* assign chosen third-groups to slots respecting clusters (backtracking) */
function matchThirds(chosen){const set=new Set(chosen);const slots=THIRD_SLOTS.filter(s=>true);const order=[...slots].sort((a,b)=>clusterOf(a).filter(g=>set.has(g)).length-clusterOf(b).filter(g=>set.has(g)).length);const used={},res={};
  (function bt(i){if(i>=order.length)return true;const s=order[i];for(const g of clusterOf(s)){if(set.has(g)&&!used[g]){used[g]=1;res[s]=g;if(bt(i+1))return true;delete used[g];delete res[s];}}return i>= chosen.length;})(0);
  return res;}

/* player predicted standings object (complete) from their group order */
function predStandings(pred){const o={};GLETTERS.forEach(L=>{const ord=(pred.order&&pred.order[L]&&pred.order[L].length===4)?pred.order[L]:GROUPS[L];o[L]={ordered:ord.map(t=>({team:t})),complete:true};});return o;}

let koCache={};
function resolveSide(s,st,kores,thirdsMap){
  if(s.t==="W"){const g=st[s.g];return g&&g.complete?g.ordered[0].team:null;}
  if(s.t==="RU"){const g=st[s.g];return g&&g.complete?g.ordered[1].team:null;}
  if(s.t==="T"){return null;} // handled in resolveMatch with slot id
  if(s.t==="WIN"){const r=kores["M"+s.m];return r&&r.w?r.w:null;}
  if(s.t==="LOSE"){const r=kores["M"+s.m];if(!r||!r.w)return null;const t=koCache[s.m];if(!t)return null;return t.a===r.w?t.b:(t.b===r.w?t.a:null);}
  return null;}
function resolveMatch(mid,st,kores,thirdsMap){const d=KO[mid];
  const side=s=>{if(s.t==="T"){const g=thirdsMap&&thirdsMap[mid];if(!g)return null;const sg=st[g];return sg&&sg.complete?sg.ordered[2].team:null;}return resolveSide(s,st,kores,thirdsMap);};
  const a=side(d.a),b=side(d.b);koCache[mid]={a,b};return {a,b,stage:d.stage};}

/* player's full predicted bracket: returns {mid:{a,b}}, plus their thirds slot map */
function playerBracket(pred){const ps=predStandings(pred);const tmap=matchThirds(pred.thirds||[]);const kores={};KO_IDS.forEach(m=>{const w=pred.ko&&pred.ko["M"+m];if(w)kores["M"+m]={w};});koCache={};const out={};KO_IDS.forEach(m=>out[m]=resolveMatch(m,ps,kores,tmap));return {bracket:out,tmap};}

function realAdvancers(results){const won=ids=>{const s=new Set();ids.forEach(m=>{const r=results["M"+m];if(r&&r.w)s.add(r.w);});return s;};return {R32:won(ROUND_MATCHES.R32),R16:won(ROUND_MATCHES.R16),QF:won(ROUND_MATCHES.QF),SF:won(ROUND_MATCHES.SF),"3RD":won(ROUND_MATCHES["3RD"]),FINAL:won(ROUND_MATCHES.FINAL)};}
const anyResult=results=>Object.keys(results||{}).length>0;

function scoreboard(players,predictions,results,cfg){
  const rst=allStandings(results); const realThirds=realThirdGroups(rst); const radv=realAdvancers(results);
  return Object.values(players).map(p=>{
    const pred=predictions[p.id]||{order:{},thirds:[],ko:{}}; let pts=0,correct=0;
    // group standings: correct 1st & 2nd
    GLETTERS.forEach(L=>{if(!rst[L].complete)return;const real=rst[L].ordered;const ord=(pred.order&&pred.order[L]&&pred.order[L].length===4)?pred.order[L]:GROUPS[L];
      if(ord[0]===real[0].team){pts+=cfg.pts.group;correct++;} if(ord[1]===real[1].team){pts+=cfg.pts.group;correct++;}});
    // thirds: each chosen group whose third really qualified
    (pred.thirds||[]).forEach(L=>{if(GLETTERS.every(g=>rst[g].complete)&&realThirds.has(L)){pts+=cfg.pts.thirds;correct++;}});
    // knockout advancement
    const {bracket}=playerBracket(pred);
    ["R32","R16","QF","SF","3RD","FINAL"].forEach(round=>{ROUND_MATCHES[round].forEach(m=>{const v=pred.ko&&pred.ko["M"+m];const br=bracket[m];if(!v||(v!==br.a&&v!==br.b))return;if(radv[round].has(v)){pts+=(cfg.pts[round]||1);correct++;}});});
    return {...p,pts,correct,tb:(pred.finalGoals==null?null:pred.finalGoals)};
  }).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(cfg.finalGoals!=null){const da=a.tb==null?Infinity:Math.abs(a.tb-cfg.finalGoals),db=b.tb==null?Infinity:Math.abs(b.tb-cfg.finalGoals);if(da!==db)return da-db;}
    return b.correct-a.correct||a.name.localeCompare(b.name);
  });
}

          ? <Admin cfg={config} results={results} standings={allStandings(results)} players={players} predictions={predictions}
              onResult={(m,o)=>Store.saveResult(m,o)} onClear={m=>Store.clearResult(m)} onConfig={o=>Store.saveConfig(o)}
              onUpdatePlayer={(pid,o)=>Store.updatePlayer(pid,o)} onRemovePlayer={pid=>Store.removePlayer(pid)} onRemoveResults={mids=>Store.removeResults(mids)} flash={flash}/>
          : <AdminGate hasPin={!!config.adminPin} onUnlock={pin=>{if(!config.adminPin){Store.saveConfig({...config,adminPin:pin});setAdmin(true);flash("You're the organizer");}else if(config.adminPin===pin)setAdmin(true);else flash("Wrong PIN");}}/>)}
      </div>
      {help && <HelpModal onClose={()=>setHelp(false)}/>}
      {toast && <div className="mono" style={{position:"fixed",bottom:18,left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",padding:"11px 18px",fontSize:13,fontWeight:700,zIndex:60,maxWidth:"90%",borderRadius:12,boxShadow:"0 6px 20px rgba(21,35,63,.3)",animation:"pop .25s"}}>{toast}</div>}
    </div>
  );
}

function HelpModal({onClose}){const step=(n,t,b)=>(<div style={{display:"flex",gap:12,marginBottom:14}}><div className="anton" style={{width:30,height:30,flexShrink:0,background:`linear-gradient(135deg,${C.gold},#f0c14b)`,color:C.navy,display:"grid",placeItems:"center",borderRadius:99,fontSize:16}}>{n}</div><div><div style={{fontWeight:800,marginBottom:2}}>{t}</div><div className="mono" style={{fontSize:12,color:C.muted,lineHeight:1.55}}>{b}</div></div></div>);
  return (<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(21,35,63,.5)",zIndex:70,display:"grid",placeItems:"center",padding:18,animation:"fade .2s"}}>
    <div onClick={e=>e.stopPropagation()} className="rise card" style={{width:"100%",maxWidth:410,padding:24,borderTop:`5px solid ${C.gold}`}}>
      <div className="anton" style={{fontSize:24,marginBottom:16,color:C.navy}}>HOW IT WORKS</div>
      {step(1,"Predict the groups","Put the 4 teams in each group in the order you think they'll finish. Top 2 go through automatically.")}
      {step(2,"Pick 8 best thirds","Choose which 8 of the 12 third-place teams sneak into the Round of 32.")}
      {step(3,"Fill the bracket","Your groups + thirds build your knockout bracket. Pick winners all the way to your champion.")}
      {step("🏆","Then watch","Everything locks at kickoff. You score for every group spot, third, and team you correctly send through each round. Most points wins!")}
      <button className="btn anton" onClick={onClose} style={{width:"100%",background:`linear-gradient(135deg,${C.gold},#f0c14b)`,color:C.navy,padding:13,fontSize:16,marginTop:4}}>LET'S GO →</button>
    </div></div>);}

/* ---- 1. GROUPS: predict standings ---- */
function GroupsTab({pred,results,locked,setOrder,onNext}){
  const [gi,setGi]=useState(0);
  const [drag,setDrag]=useState(null); // {order:[...],from:int}
  const listRef=useRef(null);
  const rst=allStandings(results);
  const L=GLETTERS[gi];
  const raw=(pred.order&&pred.order[L])||[];
  const view=drag?drag.order:raw;
  const full=view.length===4;
  const real=rst[L].complete?rst[L].ordered.map(o=>o.team):null;
  const doneCount=GLETTERS.filter(g=>pred.order&&pred.order[g]&&pred.order[g].length===4).length;
  const place=t=>{if(locked)return;if(raw.includes(t))setOrder(L,raw.filter(x=>x!==t));else if(raw.length<4)setOrder(L,[...raw,t]);};
  const onDown=(e,i)=>{if(locked||!full)return;e.preventDefault();try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){ }setDrag({order:[...raw],from:i});};
  const onMove=e=>{if(!drag||!listRef.current)return;const r=listRef.current.getBoundingClientRect();const h=r.height/4;let idx=Math.floor((e.clientY-r.top)/h);idx=Math.max(0,Math.min(3,idx));if(idx!==drag.from){const o=[...drag.order];const [m]=o.splice(drag.from,1);o.splice(idx,0,m);setDrag({order:o,from:idx});}};
  const onUp=()=>{if(!drag)return;setOrder(L,drag.order);setDrag(null);};
  const pagerBtn={width:46,height:46,borderRadius:99,display:"grid",placeItems:"center",fontSize:20,fontWeight:800};
  return (<div className="rise">
    <p className="mono" style={{fontSize:12,color:C.onblue,marginBottom:12,lineHeight:1.6}}>{locked?"Locked — showing how you did.":full?"Drag the rows to fix your order. Tap a team to take it out.":"Tap the flags in your predicted finishing order (1st → 4th). 1st & 2nd advance."}</p>
    <ProgressBar done={doneCount} total={12} label="groups set"/>
    <div className="card" style={{overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${C.navy},#15499c)`,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span className="anton" style={{fontSize:20,color:"#fff"}}>GROUP {L}</span><span className="mono" style={{fontSize:11,color:"#c7cfe0"}}>{gi+1} of 12</span></div>
        <div style={{display:"flex",gap:6,marginTop:10}}>{GROUPS[L].map(t=>{const pos=raw.indexOf(t);const on=pos>=0;return (
          <button key={t} className="btn" disabled={locked} onClick={()=>place(t)} style={{flex:1,position:"relative",display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:on?"rgba(221,159,35,.25)":"rgba(255,255,255,.1)",border:`1.5px solid ${on?C.gold:"transparent"}`,borderRadius:9,padding:"8px 2px",opacity:on?.75:1}}>
            {on&&<span className="anton" style={{position:"absolute",top:-7,left:-6,width:18,height:18,background:C.gold,color:C.navy,borderRadius:99,fontSize:11,display:"grid",placeItems:"center"}}>{pos+1}</span>}
            <Flag team={t} size={26}/><span className="mono" style={{fontSize:9,color:"#dfe5f0"}}>{CODES[t]}</span>
          </button>);})}</div>
      </div>
      <div ref={listRef} style={{padding:"6px 12px 12px"}}>
        {[0,1,2,3].map(i=>{const t=view[i];const dragging=drag&&drag.from===i;const ok=real&&i<2&&t&&real[i]===t;const bad=real&&i<2&&t&&real[i]!==t;
          if(!t)return (<div key={"e"+i} style={{display:"flex",alignItems:"center",gap:10,padding:"13px 4px",borderTop:i?`1px solid ${C.line}`:"none",color:C.muted}}><span className="anton" style={{width:18,fontSize:17,color:C.muted}}>{i+1}</span><span className="mono" style={{fontSize:12}}>tap a flag above</span></div>);
          return (<div key={t} onPointerDown={e=>onDown(e,i)} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}
            style={{display:"flex",alignItems:"center",gap:10,padding:"11px 4px",borderTop:i&&!dragging?`1px solid ${C.line}`:"none",touchAction:"none",cursor:full&&!locked?"grab":"default",
              background:dragging?"#fff":ok?"#f3f8ec":bad?C.tint:"transparent",borderRadius:dragging?10:0,boxShadow:dragging?"0 6px 18px rgba(21,35,63,.22)":"none",transform:dragging?"scale(1.02)":"none",position:"relative",zIndex:dragging?5:1}}>
            <span className="anton" style={{width:18,color:i<2?C.gold:C.muted,fontSize:17}}>{i+1}</span>
            <Flag team={t} size={26}/><span style={{flex:1,fontWeight:i<2?700:500,fontSize:15}}>{t}</span>
            {real&&i<2&&<span className="mono" style={{fontSize:10,color:ok?"#5a9c2a":C.coral}}>{ok?"✓":real[i]}</span>}
            {!locked&&(full?<span style={{color:C.muted,fontSize:18,padding:"0 4px",touchAction:"none"}}>⠿</span>:<button className="btn" onClick={()=>place(t)} style={{background:"transparent",color:C.coral,border:`1px solid ${C.line}`,width:24,height:24,borderRadius:7,fontSize:12}}>×</button>)}
          </div>);})}
      </div>
    </div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:14}}>
      <button className="btn" disabled={gi===0} onClick={()=>setGi(gi-1)} style={{...pagerBtn,background:C.panel,color:C.navy,border:`1.5px solid ${C.line}`,opacity:gi===0?.4:1}}>←</button>
      {!locked&&raw.length>0?<button className="btn mono" onClick={()=>setOrder(L,[])} style={{background:C.panel,color:C.muted,border:`1.5px solid ${C.line}`,padding:"9px 14px",fontSize:11,borderRadius:99}}>reset group</button>:<span className="mono" style={{fontSize:12,color:C.onblue}}>Group {gi+1} / 12</span>}
      <button className="btn" disabled={gi===11} onClick={()=>setGi(gi+1)} style={{...pagerBtn,background:C.panel,color:C.navy,border:`1.5px solid ${C.line}`,opacity:gi===11?.4:1}}>→</button>
    </div>
    {!locked && (doneCount===12
      ? <button className="btn anton" onClick={onNext} style={{marginTop:14,width:"100%",background:`linear-gradient(135deg,${C.gold},#ffd84d)`,color:C.navy,padding:14,fontSize:16}}>NEXT: PICK THIRDS →</button>
      : <p className="mono" style={{marginTop:16,textAlign:"center",fontSize:11,color:C.onblue}}>Fill out all 12 groups to unlock the next step · {doneCount}/12 done</p>)}
  </div>);}

/* ---- 2. THIRDS ---- */
function ThirdsTab({pred,results,locked,toggleThird,onNext,onBack}){
  const rst=allStandings(results); const realThirds=GLETTERS.every(g=>rst[g].complete)?realThirdGroups(rst):null;
  const ordered=L=>(pred.order&&pred.order[L]&&pred.order[L].length===4)?pred.order[L]:GROUPS[L];
  const chosen=pred.thirds||[];
  const groupsDone=GLETTERS.filter(L=>pred.order&&pred.order[L]&&pred.order[L].length===4).length;
  if(groupsDone<12 && !locked) return (<div className="rise"><div className="card mono" style={{textAlign:"center",color:C.muted,padding:"34px 20px",fontSize:13,lineHeight:1.7}}>Finish <b style={{color:C.navy}}>Step 1</b> first — rank all 12 groups, then come back to pick your thirds. Your 3rd-place teams come straight from your group orders.<div className="mono" style={{fontSize:12,color:C.gold,fontWeight:700,marginTop:10}}>{groupsDone} of 12 groups done</div><button className="btn anton" onClick={onBack} style={{marginTop:16,background:`linear-gradient(135deg,${C.gold},#f0c14b)`,color:C.navy,padding:"11px 22px",fontSize:15}}>← BACK TO GROUPS</button></div></div>);
  return (<div className="rise">
    <p className="mono" style={{fontSize:12,color:C.onblue,marginBottom:6,lineHeight:1.6}}>Each group's predicted 3rd-place team is below. Pick the <b>8</b> you think advance to the Round of 32.{locked?" (Locked.)":""}</p>
    <ProgressBar done={chosen.length} total={8} label="thirds chosen"/>
    <div style={{display:"grid",gap:8}}>
      {GLETTERS.map(L=>{const team=ordered(L)[2];const sel=chosen.includes(L);const reallyIn=realThirds&&realThirds.has(L);const ok=locked&&sel&&reallyIn;const bad=locked&&sel&&!reallyIn;
        return (<button key={L} className="btn" disabled={locked} onClick={()=>toggleThird(L)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",textAlign:"left",
          background:ok?`linear-gradient(135deg,${C.gold},#f0c14b)`:sel?(bad?C.tint:C.panel2):(reallyIn&&locked?"#eef6e6":C.panel),
          border:`2px solid ${ok?C.gold:sel?(bad?C.coral:C.gold):(reallyIn&&locked?"#9fcf6f":C.line)}`,borderRadius:13}}>
          <span className="mono" style={{fontSize:10,color:C.muted,width:48}}>3rd / {L}</span><Flag team={team} size={24}/>
          <span style={{flex:1,fontWeight:700,color:bad?C.coral:C.text}}>{team}</span>
          {locked?(reallyIn?<span className="mono" style={{fontSize:10,color:ok?C.navy:"#5a9c2a"}}>qualified</span>:<span className="mono" style={{fontSize:10,color:C.muted}}>out</span>)
            :<span style={{width:22,height:22,borderRadius:99,border:`2px solid ${sel?C.gold:C.line}`,background:sel?C.gold:"transparent",display:"grid",placeItems:"center",color:C.navy,fontSize:12,fontWeight:800}}>{sel?"✓":""}</span>}
        </button>);})}
    </div>
    {!locked && <button className="btn anton" disabled={chosen.length!==8} onClick={onNext} style={{marginTop:16,width:"100%",background:chosen.length===8?`linear-gradient(135deg,${C.gold},#f0c14b)`:C.line,color:C.navy,padding:14,fontSize:16,opacity:chosen.length===8?1:.6}}>{chosen.length===8?"NEXT: BUILD BRACKET →":`PICK ${8-chosen.length} MORE`}</button>}
  </div>);}

/* ---- 3. BRACKET TREE (full FIFA-style tree) ---- */
function BracketTab({pred,results,locked,tbLocked,pickKO,cfg,onTiebreaker}){
  const {bracket}=playerBracket(pred); const need=(pred.thirds||[]).length<8;
  const radv=locked?realAdvancers(results):null;
  const valid=m=>{const v=pred.ko&&pred.ko["M"+m];return v&&(v===bracket[m].a||v===bracket[m].b)?v:null;};
  const champ=valid(104);
  const LC="#8aa0d8";
  const wrapRef=useRef(null); const cardRefs=useRef({}); const vpRef=useRef(null); const drag=useRef(null);
  const [g,setG]=useState({w:0,h:0,paths:[]});
  const teamSig=KO_IDS.map(m=>(bracket[m].a||"")+">"+(bracket[m].b||"")).join("|");
  const pickSig=KO_IDS.map(m=>valid(m)||"").join("|");
  useLayoutEffect(()=>{
    if(need)return;
    const measure=()=>{const wrap=wrapRef.current;if(!wrap)return;const wb=wrap.getBoundingClientRect();
      const pos=mid=>{const el=cardRefs.current[mid];if(!el)return null;const r=el.getBoundingClientRect();return {l:r.left-wb.left,r:r.right-wb.left,my:(r.top+r.bottom)/2-wb.top};};
      const paths=[];[89,90,91,92,93,94,95,96,97,98,99,100,101,102,104].forEach(mid=>{const d=KO[mid];const A=pos(d.a.m),B=pos(d.b.m),P=pos(mid);if(!A||!B||!P)return;const mx=(A.r+P.l)/2;
        paths.push(`M${A.r},${A.my} H${mx} M${B.r},${B.my} H${mx} M${mx},${A.my} V${B.my} M${mx},${P.my} H${P.l}`);});
      setG({w:wrap.offsetWidth,h:wrap.offsetHeight,paths});};
    const raf=requestAnimationFrame(measure);
    window.addEventListener("resize",measure);
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",measure);};
  },[teamSig,need,locked]);
  // auto-center the next match that still needs a pick
  useEffect(()=>{
    if(need||locked)return;
    const t=setTimeout(()=>{
      const all=[...KO_ORDER.R32,...KO_ORDER.R16,...KO_ORDER.QF,...KO_ORDER.SF,...KO_ORDER.FINAL];
      const next=all.find(m=>bracket[m].a&&bracket[m].b&&!valid(m))||104;
      const el=cardRefs.current[next], vp=vpRef.current; if(!el||!vp)return;
      vp.scrollTo({left:el.offsetLeft+el.offsetWidth/2-vp.clientWidth/2,top:el.offsetTop+el.offsetHeight/2-vp.clientHeight/2,behavior:"smooth"});
    },200);
    return ()=>clearTimeout(t);
  },[pickSig,need,locked]);
  const onDown=e=>{if(e.pointerType==="touch"||e.target.closest("button"))return;const vp=vpRef.current;drag.current={x:e.clientX,y:e.clientY,sl:vp.scrollLeft,st:vp.scrollTop};};
  const onMove=e=>{if(!drag.current)return;const vp=vpRef.current;vp.scrollLeft=drag.current.sl-(e.clientX-drag.current.x);vp.scrollTop=drag.current.st-(e.clientY-drag.current.y);};
  const onUp=()=>{drag.current=null;};
  if(need) return (<div className="rise"><div className="card mono" style={{textAlign:"center",color:C.muted,padding:"34px 20px",fontSize:13,lineHeight:1.7}}>Finish steps 1 & 2 first — set your group orders and pick your <b style={{color:C.navy}}>8 third-place teams</b>. Then your bracket builds itself here. ⚽</div></div>);
  const Cell=({mid,team})=>{
    if(!team)return <div style={{padding:"7px 8px",margin:"3px 0",borderRadius:7,background:"rgba(255,255,255,.6)",color:"#9aa3b6",fontSize:10}}>—</div>;
    const sel=valid(mid)===team; const adv=locked&&radv&&radv[KO[mid].stage].has(team);
    const right=locked&&sel&&adv, wrong=locked&&sel&&!adv;
    return (<button className="btn" disabled={locked} onClick={()=>pickKO(mid,team)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 8px",width:"100%",margin:"3px 0",borderRadius:7,
      background:right?`linear-gradient(135deg,${C.gold},#f0c14b)`:sel?(wrong?"#ffe2dc":"#fff"):(adv?"#e7f3da":"#fff"),
      border:`1.5px solid ${right?C.gold:sel?(wrong?C.coral:C.gold):(adv?"#9fcf6f":"transparent")}`}}>
      <Flag team={team} size={18}/><span style={{flex:1,textAlign:"left",fontSize:12,fontWeight:800,letterSpacing:".02em",color:wrong?C.coral:C.navy}}>{CODES[team]||team}</span>
      <span style={{width:15,height:15,borderRadius:99,flexShrink:0,border:`2px solid ${sel?C.gold:"#cfd6e2"}`,background:right?C.navy:sel?C.gold:"transparent"}}/>
    </button>);
  };
  const Card=({mid})=>(
    <div ref={el=>{if(el)cardRefs.current[mid]=el;}} style={{background:C.navy,borderRadius:10,padding:"5px 7px",width:138,boxShadow:"0 2px 8px rgba(13,44,102,.18)"}}>
      <Cell mid={mid} team={bracket[mid].a}/><Cell mid={mid} team={bracket[mid].b}/>
    </div>);
  const cols=[["R32","R32"],["R16","R16"],["QF","QF"],["SF","SF"],["FINAL","FINAL"]];
  return (<div className="rise">
    <div style={{background:`linear-gradient(135deg,${C.coral},#e85d52)`,borderRadius:12,padding:"9px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:9,boxShadow:"0 3px 10px rgba(216,35,42,.28)"}}><span style={{fontSize:18}}>⚔️</span><span className="anton" style={{fontSize:17,color:"#fff",letterSpacing:".03em"}}>KNOCKOUT STAGE</span></div>
    <p className="mono" style={{fontSize:12,color:C.onblue,marginBottom:10,lineHeight:1.6}}>Tap who advances — the view jumps to your next pick. Drag inside the bracket to look around.{locked?" Locked — green = really advanced.":""}</p>
    {champ && <div className="card" style={{padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:11,borderColor:C.gold}}><span style={{fontSize:24}}>🏆</span><div><div className="mono" style={{fontSize:10,color:C.muted}}>YOUR CHAMPION</div><div className="anton" style={{fontSize:19,color:C.navy,display:"flex",alignItems:"center",gap:8,marginTop:2}}><Flag team={champ} size={26}/>{champ}</div></div></div>}
    <div ref={vpRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
      style={{overflow:"auto",WebkitOverflowScrolling:"touch",touchAction:"pan-x pan-y",height:"min(70vh,620px)",border:`1.5px solid #cdd7f0`,borderRadius:14,background:"linear-gradient(160deg,#e8eefb,#dbe4f8)",cursor:"grab"}}>
      <div ref={wrapRef} style={{display:"flex",alignItems:"stretch",position:"relative",width:"max-content",padding:"6px 10px 10px"}}>
        <svg width={g.w} height={g.h} style={{position:"absolute",top:0,left:0,pointerEvents:"none",zIndex:0}}>{g.paths.map((d,i)=><path key={i} d={d} stroke={LC} strokeWidth="2" fill="none"/>)}</svg>
        {cols.map(([round],ci)=>(
          <div key={round} style={{display:"flex",flexDirection:"column",marginRight:ci<cols.length-1?40:0,zIndex:1}}>
            <div className="anton" style={{fontSize:13,color:C.coral,textAlign:"center",padding:"2px 0 8px"}}>{round==="FINAL"?"FINAL":round}<div className="mono" style={{fontSize:8,color:C.muted,fontWeight:400}}>{cfg.pts[round]} pts</div></div>
            <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"space-around"}}>
              {KO_ORDER[round].map(mid=><Card key={mid} mid={mid}/>)}
            </div>
          </div>
        ))}
      </div>
    </div>
    <div style={{marginTop:16}}>
      <div className="anton" style={{fontSize:14,color:"#fff",marginBottom:6}}>3RD-PLACE PLAYOFF <span className="mono" style={{fontSize:10,color:C.onblue,fontWeight:400}}>· {cfg.pts["3RD"]} pts</span></div>
      <div style={{background:C.navy,borderRadius:10,padding:"6px 8px",maxWidth:200}}><Cell mid={103} team={bracket[103].a}/><Cell mid={103} team={bracket[103].b}/></div>
    </div>
    <div className="card" style={{marginTop:16,padding:"14px 16px",borderColor:C.blue,borderWidth:2}}>
      <div className="anton" style={{fontSize:15,color:C.navy,marginBottom:4}}>⚽ TIEBREAKER {tbLocked&&<span className="mono" style={{fontSize:10,color:C.coral}}>· LOCKED</span>}</div>
      <p className="mono" style={{fontSize:11,color:C.muted,lineHeight:1.55,marginBottom:10}}>Total goals scored in the <b>Final</b> (both teams combined). If two people tie on points, whoever's closest wins. {tbLocked?"This is now locked.":"You can set or change it right up until the Final."}</p>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <input disabled={tbLocked} inputMode="numeric" placeholder="e.g. 3" value={pred.finalGoals==null?"":pred.finalGoals}
          onChange={e=>{const v=e.target.value.replace(/\D/g,"");onTiebreaker(v===""?null:Math.min(20,parseInt(v)));}}
          style={{width:90,background:tbLocked?"#eee7d3":"#eef2fc",border:`2px solid ${C.line}`,color:C.text,padding:"11px",fontSize:18,textAlign:"center",fontWeight:700,borderRadius:10,opacity:tbLocked?.6:1}}/>
        <span className="mono" style={{fontSize:12,color:pred.finalGoals==null?C.coral:"#2f9e44",fontWeight:700}}>{pred.finalGoals==null?"not set yet":"saved ✓"}</span>
      </div>
    </div>
  </div>);}

function Board({board,players,me,cfg}){return (<div className="rise">
  {board.length===0?<div className="card mono" style={{textAlign:"center",color:C.muted,padding:"40px"}}>No players yet.</div>:
  <div style={{display:"grid",gap:8}}>
    <div className="mono" style={{display:"grid",gridTemplateColumns:"30px 1fr 64px 52px",gap:8,padding:"0 14px",fontSize:10,color:C.onblue,textTransform:"uppercase",fontWeight:700}}><span>#</span><span>player</span><span style={{textAlign:"center"}}>correct</span><span style={{textAlign:"right"}}>pts</span></div>
    {board.map((p,i)=>{const tied=board.some((q,j)=>j!==i&&q.pts===p.pts);return (<div key={p.id} className="card rise" style={{animationDelay:`${i*30}ms`,display:"grid",gridTemplateColumns:"30px 1fr 64px 52px",alignItems:"center",gap:8,padding:"12px 14px",border:i===0?`2px solid ${C.gold}`:`1.5px solid ${C.line}`,background:i===0?"#eef3fe":C.panel}}>
      <span className="anton" style={{color:i===0?C.gold:C.muted,fontSize:19}}>{i+1}</span>
      <span style={{display:"flex",alignItems:"center",gap:9,fontWeight:700,minWidth:0}}><span style={{width:24,height:24,flexShrink:0,background:colorFor(p.id,players),color:"#fff",display:"grid",placeItems:"center",fontSize:10,fontWeight:800,borderRadius:8}}>{inits(p.name)}</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}{p.id===me.pid&&<span className="mono" style={{fontSize:9,color:C.muted}}> (you)</span>}</span>{i===0&&<span style={{fontSize:14}}>🏆</span>}{tied&&<span className="mono" style={{fontSize:8,color:C.blue,fontWeight:700,border:`1px solid ${C.blue}`,borderRadius:5,padding:"1px 4px"}}>TIE</span>}</span>
      <span className="mono" style={{fontSize:13,color:C.muted,textAlign:"center"}}>{p.correct}</span>
      <span className="anton" style={{fontSize:19,textAlign:"right",color:i===0?C.gold:C.navy}}>{p.pts}</span>
    </div>);})}
    <p className="mono" style={{fontSize:10,color:C.onblue,marginTop:6,lineHeight:1.6}}>Points: group spot {cfg.pts.group}, each third {cfg.pts.thirds}, then advancing teams R32 {cfg.pts.R32} · R16 {cfg.pts.R16} · QF {cfg.pts.QF} · SF {cfg.pts.SF} · Final {cfg.pts.FINAL}. Ties break by closest guess to total goals in the Final, then most correct picks.</p>
  </div>}
</div>);}

/* ---- ORGANIZER ---- */
function Admin({cfg,results,standings,players,predictions,onResult,onClear,onConfig,onUpdatePlayer,onRemovePlayer,onRemoveResults,flash}){
  const [sub,setSub]=useState("lock");
  const locked=cfg.locked||anyResult(results);
  const groupIds=GROUP_MATCHES.map(m=>m.id), koIds=KO_IDS.map(m=>"M"+m);
  const resetBtn={width:"100%",textAlign:"left",padding:"11px 13px",fontSize:13,fontWeight:700,borderRadius:11,background:C.panel,color:C.coral,border:`1.5px solid ${C.line}`,marginTop:8};
  const confirmClear=(label,fn)=>{if(window.confirm(`Delete ${label}? This can't be undone.`)){fn();flash(label+" cleared");}};
  return (<div className="rise">
    <p className="mono" style={{fontSize:11,color:C.onblue,marginBottom:10,lineHeight:1.5}}>Organizer area. Lock predictions at kickoff, then enter real results — scores update live.</p>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[["lock","LOCK / RESET"],["group","GROUP SCORES"],["thirds","REAL THIRDS"],["ko","KNOCKOUT"],["scoring","POINTS"],["players","PLAYERS"],["picks","VIEW PICKS"]].map(([k,l])=>(<button key={k} className="btn mono" onClick={()=>setSub(k)} style={{flex:"1 0 auto",background:sub===k?C.navy:C.panel,color:sub===k?"#fff":C.muted,border:`1.5px solid ${sub===k?"transparent":C.line}`,padding:"8px 6px",fontSize:10,borderRadius:9}}>{l}</button>))}</div>
    {sub==="lock" && <div>
      <div className="card" style={{padding:14}}>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:locked&&anyResult(results)?"default":"pointer",fontSize:14,fontWeight:700}}><input type="checkbox" checked={locked} disabled={anyResult(results)} onChange={e=>onConfig({...cfg,locked:e.target.checked})} style={{width:20,height:20,accentColor:C.gold}}/>Lock all predictions</label>
        <p className="mono" style={{fontSize:11,color:C.muted,marginTop:8,lineHeight:1.6}}>Turn this on right before the first match kicks off — players can't edit after. It also locks automatically once you enter any real result below.</p>
      </div>
      <div className="card" style={{padding:14,marginTop:12}}>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:cfg.finalGoals!=null?"default":"pointer",fontSize:14,fontWeight:700}}><input type="checkbox" checked={cfg.tbLocked||cfg.finalGoals!=null} disabled={cfg.finalGoals!=null} onChange={e=>onConfig({...cfg,tbLocked:e.target.checked})} style={{width:20,height:20,accentColor:C.blue}}/>Lock the tiebreaker</label>
        <p className="mono" style={{fontSize:11,color:C.muted,marginTop:8,lineHeight:1.6}}>Separate from the main lock — leave this OFF so players can still set their goals-in-the-final guess after the bracket locks. Turn it on before the Final kicks off. It also locks by itself once you enter the real final goal total.</p>
      </div>
      <div className="card" style={{padding:14,marginTop:12}}>
        <div className="anton" style={{fontSize:15,color:C.navy,marginBottom:2}}>RESET RESULTS</div>
        <p className="mono" style={{fontSize:11,color:C.muted,lineHeight:1.5}}>Wipe what you've entered (handy after testing, or to fix a mistake). This clears <b>real results only</b> — never anyone's predictions.</p>
        <button className="btn" onClick={()=>confirmClear("all group scores",()=>onRemoveResults(groupIds))} style={resetBtn}>Clear all group scores</button>
        <button className="btn" onClick={()=>confirmClear("all knockout results",()=>onRemoveResults(koIds))} style={resetBtn}>Clear all knockout results</button>
        <button className="btn" onClick={()=>confirmClear("the real third-place slot assignment",()=>onConfig({...cfg,thirds:{}}))} style={resetBtn}>Clear third-place slot assignment</button>
        <button className="btn" onClick={()=>confirmClear("EVERYTHING (all results + thirds)",()=>{onRemoveResults([...groupIds,...koIds]);onConfig({...cfg,thirds:{},locked:false});})} style={{...resetBtn,background:C.tint,borderColor:C.coral}}>Clear everything & unlock</button>
      </div>
    </div>}
    {sub==="group" && <AdminGroups results={results} onResult={onResult} onClear={onClear}/>}
    {sub==="thirds" && <AdminRealThirds standings={standings}/>}
    {sub==="ko" && <AdminKO results={results} standings={standings} cfg={cfg} onResult={onResult} onClear={onClear} onConfig={onConfig}/>}
    {sub==="scoring" && <AdminScoring cfg={cfg} onConfig={onConfig} flash={flash}/>}
    {sub==="players" && <PlayersAdmin players={players} predictions={predictions} onUpdate={onUpdatePlayer} onRemove={onRemovePlayer} flash={flash}/>}
    {sub==="picks" && <PicksAdmin players={players} predictions={predictions}/>}
  </div>);}

function ScoreEntry({mid,home,away,result,onResult,onClear}){
  const [h,setH]=useState(result&&result.hs!=null?String(result.hs):"");const [a,setA]=useState(result&&result.as!=null?String(result.as):"");
  useEffect(()=>{setH(result&&result.hs!=null?String(result.hs):"");setA(result&&result.as!=null?String(result.as):"");},[result&&result.hs,result&&result.as]);
  const sip={width:42,background:"#eef2fc",border:`2px solid ${C.line}`,color:C.text,padding:"7px",fontSize:15,textAlign:"center"};const fin=result&&result.hs!=null;
  return (<div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 0",borderTop:`1px solid ${C.line}`}}><Flag team={home} size={18}/><span style={{flex:1,fontSize:12,fontWeight:fin?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{home} v {away}</span><Flag team={away} size={18}/><input style={sip} inputMode="numeric" placeholder="–" value={h} onChange={e=>setH(e.target.value.replace(/\D/g,""))}/><input style={sip} inputMode="numeric" placeholder="–" value={a} onChange={e=>setA(e.target.value.replace(/\D/g,""))}/><button className="btn" disabled={h===""||a===""} onClick={()=>onResult(mid,{hs:+h,as:+a})} style={{background:(h!==""&&a!=="")?C.gold:C.line,color:C.navy,padding:"7px 9px",fontSize:11,borderRadius:8}}>{fin?"✓":"SET"}</button>{fin&&<button className="btn mono" onClick={()=>onClear(mid)} style={{background:"transparent",color:C.coral,border:`1.5px solid ${C.line}`,padding:"6px 7px",fontSize:10,borderRadius:8}}>×</button>}</div>);}
function AdminGroups({results,onResult,onClear}){const [g,setG]=useState("A");return (<div><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>{GLETTERS.map(l=><button key={l} className="btn anton" onClick={()=>setG(l)} style={{background:g===l?C.gold:C.panel,color:g===l?C.navy:C.muted,border:`1.5px solid ${g===l?"transparent":C.line}`,padding:"6px 12px",fontSize:13,borderRadius:9}}>{l}</button>)}</div><div className="card" style={{padding:"4px 14px 12px"}}>{GROUP_MATCHES.filter(m=>m.group===g).map(m=><ScoreEntry key={m.id} mid={m.id} home={m.home} away={m.away} result={results[m.id]} onResult={onResult} onClear={onClear}/>)}</div></div>);}
function AdminRealThirds({standings}){const done=GLETTERS.every(g=>standings[g].complete);const rt=done?realThirdGroups(standings):null;return (<div className="card" style={{padding:14}}><p className="mono" style={{fontSize:11,color:C.muted,lineHeight:1.6}}>The 8 best real third-place teams are computed automatically from the group scores you enter (no input needed here).</p>{done?<div className="mono" style={{fontSize:12,marginTop:10,lineHeight:1.8}}>{GLETTERS.map(L=>{const t=standings[L].ordered[2].team;const inn=rt.has(L);return <div key={L} style={{color:inn?"#2f9e44":C.muted}}>{L}: {t} {inn?"✓ qualifies":"— out"}</div>;})}</div>:<p className="mono" style={{fontSize:11,color:C.coral,marginTop:8}}>Enter all group scores first.</p>}</div>);}
function AdminKO({results,standings,cfg,onResult,onClear,onConfig}){koCache={};const tmap=cfg.thirds||{};const res={};const kores={};KO_IDS.forEach(m=>{const r=results["M"+m];if(r&&r.w)kores["M"+m]={w:r.w};});KO_IDS.forEach(m=>res[m]=resolveMatch(m,standings,kores,tmap));
  return (<div>
    <div className="card" style={{padding:"11px 13px",marginBottom:10,boxShadow:"none",borderColor:C.blue}}>
      <div className="anton" style={{fontSize:14,color:C.navy,marginBottom:3}}>⚽ TIEBREAKER — REAL GOALS IN FINAL</div>
      <p className="mono" style={{fontSize:10,color:C.muted,lineHeight:1.5,marginBottom:8}}>After the Final, enter the total goals both teams scored. Ties on points break by who guessed closest. (This does not lock the app.)</p>
      <div style={{display:"flex",alignItems:"center",gap:8}}><input inputMode="numeric" placeholder="–" value={cfg.finalGoals==null?"":cfg.finalGoals} onChange={e=>{const v=e.target.value.replace(/\D/g,"");onConfig({...cfg,finalGoals:v===""?null:parseInt(v)});}} style={{width:70,background:"#eef2fc",border:`2px solid ${C.line}`,color:C.text,padding:"9px",fontSize:16,textAlign:"center",fontWeight:700,borderRadius:9}}/><span className="mono" style={{fontSize:11,color:cfg.finalGoals==null?C.muted:"#2f9e44"}}>{cfg.finalGoals==null?"not entered":"set ✓"}</span></div>
    </div>
    <div className="card mono" style={{padding:"10px 13px",marginBottom:10,fontSize:11,color:C.muted,lineHeight:1.6,boxShadow:"none"}}>Real bracket fills as you enter results. Note: the official 3rd-place slot assignment must be set in your code/config for exact real matchups; winners still score correctly by team.</div>
  <div style={{display:"grid",gap:8}}>{KO_IDS.map(mid=>{const {a,b,stage}=res[mid];const r=results["M"+mid];return (<div key={mid} className="card" style={{padding:"9px 11px",boxShadow:"none"}}><div className="mono" style={{fontSize:9,color:C.muted,marginBottom:5}}>{STAGE_LABEL[stage]}</div>{!a||!b?<div className="mono" style={{fontSize:12,color:C.muted}}>waiting…</div>:<div style={{display:"flex",gap:6,alignItems:"center"}}>{[a,b].map(t=><button key={t} className="btn" onClick={()=>onResult("M"+mid,{w:t})} style={{flex:1,display:"flex",alignItems:"center",gap:7,padding:"9px",fontSize:12,fontWeight:700,background:r&&r.w===t?C.gold:C.panel,color:r&&r.w===t?C.navy:C.text,border:`2px solid ${r&&r.w===t?C.gold:C.line}`}}><Flag team={t} size={20}/>{CODES[t]||t}</button>)}{r&&r.w&&<button className="btn mono" onClick={()=>onClear("M"+mid)} style={{background:"transparent",color:C.coral,border:`1.5px solid ${C.line}`,padding:"7px 8px",fontSize:10,borderRadius:8}}>×</button>}</div>}</div>);})}</div></div>);}
function AdminScoring({cfg,onConfig,flash}){const [p,setP]=useState({...cfg.pts});const f={display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${C.line}`};const ip={width:60,background:"#eef2fc",border:`2px solid ${C.line}`,color:C.text,padding:"7px",fontSize:14,textAlign:"center"};const row=(k,l)=>(<div style={f}><span className="mono" style={{fontSize:12}}>{l}</span><input style={ip} inputMode="numeric" value={p[k]} onChange={e=>setP({...p,[k]:e.target.value.replace(/\D/g,"")})}/></div>);
  return (<div className="card" style={{padding:"4px 16px 14px"}}><p className="mono" style={{fontSize:11,color:C.muted,padding:"9px 0"}}>Points per correct prediction.</p>{row("group","Group spot (1st/2nd)")}{row("thirds","Each correct third")}{row("R32","Reach Round of 16")}{row("R16","Reach Quarters")}{row("QF","Reach Semis")}{row("SF","Reach Final")}{row("3RD","Win 3rd place")}{row("FINAL","Champion")}<button className="btn anton" onClick={()=>{const np={};Object.keys(p).forEach(k=>np[k]=parseInt(p[k]||"0"));onConfig({...cfg,pts:np});flash("Points saved");}} style={{width:"100%",background:`linear-gradient(135deg,${C.gold},#f0c14b)`,color:C.navy,padding:12,fontSize:15,marginTop:12}}>SAVE POINTS</button></div>);}

function PlayersAdmin({players,predictions,onUpdate,onRemove,flash}){const list=Object.values(players).sort((a,b)=>a.name.localeCompare(b.name));return (<div><p className="mono" style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.6}}>Fix a name, reset a forgotten PIN, or remove someone (also clears their bracket).</p>{list.length===0?<div className="card mono" style={{textAlign:"center",color:C.muted,padding:"34px",fontSize:13}}>No players yet.</div>:<div style={{display:"grid",gap:8}}>{list.map(p=><PlayerRow key={p.id} p={p} players={players} onUpdate={onUpdate} onRemove={onRemove} flash={flash}/>)}</div>}</div>);}
function PlayerRow({p,players,onUpdate,onRemove,flash}){const [ed,setEd]=useState(false);const [name,setName]=useState(p.name);const [pin,setPin]=useState(p.pin);useEffect(()=>{setName(p.name);setPin(p.pin);},[p.name,p.pin]);const ip={background:"#eef2fc",border:`2px solid ${C.line}`,color:C.text,padding:"9px 10px",fontSize:14};
  const save=()=>{if(!name.trim())return flash("Name needed");if(!/^\d{4}$/.test(pin))return flash("PIN = 4 numbers");if(Object.values(players).find(x=>x.id!==p.id&&x.name.trim().toLowerCase()===name.trim().toLowerCase()))return flash("Name taken");onUpdate(p.id,{...p,name:name.trim(),pin});setEd(false);flash("Saved");};
  const del=()=>{if(window.confirm(`Delete "${p.name}"? Removes their bracket too.`))onRemove(p.id);};
  return (<div className="card" style={{padding:"11px 13px",boxShadow:"none"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{width:30,height:30,flexShrink:0,background:colorFor(p.id,players),color:"#fff",display:"grid",placeItems:"center",fontSize:11,fontWeight:800,borderRadius:9}}>{inits(p.name)}</span><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div><div className="mono" style={{fontSize:10,color:C.muted}}>PIN {p.pin}</div></div>{!ed&&<><button className="btn mono" onClick={()=>setEd(true)} style={{background:C.panel,color:C.navy,border:`1.5px solid ${C.line}`,padding:"7px 11px",fontSize:11,borderRadius:9}}>edit</button><button className="btn mono" onClick={del} style={{background:C.panel,color:C.coral,border:`1.5px solid ${C.line}`,padding:"7px 11px",fontSize:11,borderRadius:9}}>delete</button></>}</div>{ed&&<div style={{marginTop:11,display:"grid",gap:8}}><div style={{display:"flex",gap:8}}><input style={{...ip,flex:1}} value={name} onChange={e=>setName(e.target.value)}/><input style={{...ip,width:90}} inputMode="numeric" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))}/></div><div style={{display:"flex",gap:8}}><button className="btn anton" onClick={save} style={{flex:1,background:`linear-gradient(135deg,${C.gold},#f0c14b)`,color:C.navy,padding:"10px",fontSize:14}}>SAVE</button><button className="btn mono" onClick={()=>{setName(p.name);setPin(p.pin);setEd(false);}} style={{background:C.panel,color:C.muted,border:`1.5px solid ${C.line}`,padding:"10px 16px",fontSize:12,borderRadius:9}}>cancel</button></div></div>}</div>);}

function PicksAdmin({players,predictions}){
  const list=Object.values(players).sort((a,b)=>a.name.localeCompare(b.name));
  const [pid,setPid]=useState(list[0]?list[0].id:null);
  if(list.length===0)return <div className="card mono" style={{textAlign:"center",color:C.muted,padding:"34px",fontSize:13}}>No players yet.</div>;
  const pred=predictions[pid]||{order:{},thirds:[],ko:{}};
  const ordered=L=>(pred.order&&pred.order[L]&&pred.order[L].length===4)?pred.order[L]:GROUPS[L];
  const {bracket}=playerBracket(pred);
  const v=m=>{const x=pred.ko&&pred.ko["M"+m];return x&&(x===bracket[m].a||x===bracket[m].b)?x:null;};
  const Team=({t})=>t?<span style={{display:"inline-flex",alignItems:"center",gap:5}}><Flag team={t} size={16}/>{CODES[t]||t}</span>:<span style={{color:C.muted}}>—</span>;
  return (<div>
    <p className="mono" style={{fontSize:11,color:C.muted,marginBottom:10,lineHeight:1.5}}>Review any participant's full prediction.</p>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>{list.map(p=><button key={p.id} className="btn" onClick={()=>setPid(p.id)} style={{display:"flex",alignItems:"center",gap:6,background:pid===p.id?C.navy:C.panel,color:pid===p.id?"#fff":C.text,border:`1.5px solid ${pid===p.id?"transparent":C.line}`,padding:"7px 11px",fontSize:12,fontWeight:700,borderRadius:99}}><span style={{width:20,height:20,background:colorFor(p.id,players),color:"#fff",display:"grid",placeItems:"center",fontSize:9,fontWeight:800,borderRadius:6}}>{inits(p.name)}</span>{p.name}</button>)}</div>
    <div className="card" style={{padding:14,marginBottom:12,display:"flex",alignItems:"center",gap:10,borderColor:C.gold}}><span style={{fontSize:22}}>🏆</span><div><div className="mono" style={{fontSize:10,color:C.muted}}>CHAMPION</div><div className="anton" style={{fontSize:18,color:C.navy,display:"flex",alignItems:"center",gap:7,marginTop:2}}>{v(104)?<><Flag team={v(104)} size={22}/>{v(104)}</>:"not picked"}</div></div></div>
    <div className="card" style={{padding:"12px 14px",marginBottom:12}}>
      <div className="anton" style={{fontSize:14,color:C.navy,marginBottom:8}}>KNOCKOUT</div>
      <div className="mono" style={{fontSize:12,lineHeight:2}}>
        <div><b>Final:</b> <Team t={v(104)}/></div>
        <div><b>Finalists:</b> <Team t={v(101)}/> · <Team t={v(102)}/></div>
        <div><b>Semis:</b> {[97,98,99,100].map((m,i)=><span key={m}>{i?" · ":""}<Team t={v(m)}/></span>)}</div>
      </div>
    </div>
    <div className="card" style={{padding:"12px 14px",marginBottom:12}}>
      <div className="anton" style={{fontSize:14,color:C.navy,marginBottom:8}}>GROUPS (top 2)</div>
      <div className="mono" style={{fontSize:12,lineHeight:1.9,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:"2px 12px"}}>
        {GLETTERS.map(L=>{const o=ordered(L);return <div key={L}><b>{L}:</b> <Team t={o[0]}/> <Team t={o[1]}/></div>;})}
      </div>
    </div>
    <div className="card" style={{padding:"12px 14px"}}>
      <div className="anton" style={{fontSize:14,color:C.navy,marginBottom:8}}>BEST THIRDS ({(pred.thirds||[]).length}/8)</div>
      <div className="mono" style={{fontSize:12,lineHeight:1.9}}>{(pred.thirds||[]).length?(pred.thirds||[]).map(L=><span key={L} style={{marginRight:10,display:"inline-block"}}><Team t={ordered(L)[2]}/></span>):<span style={{color:C.muted}}>none picked</span>}</div>
    </div>
  </div>);}

function Login({onLogin,toast,mode}){const [name,setName]=useState(""),[pin,setPin]=useState("");const ip={width:"100%",background:C.panel,border:`2px solid ${C.line}`,color:C.text,padding:"14px",fontSize:16,marginTop:10};

    {toast&&<p className="mono" style={{color:C.coral,fontSize:12,marginTop:12}}>{toast}</p>}
  </div></div>);}
function AdminGate({hasPin,onUnlock}){const [pin,setPin]=useState("");return (<div className="rise card" style={{padding:22,textAlign:"center",borderTop:`5px solid ${C.gold}`}}><div className="anton" style={{fontSize:18,color:C.navy}}>{hasPin?"ORGANIZER ONLY":"BECOME THE ORGANIZER"}</div><p className="mono" style={{fontSize:12,color:C.muted,margin:"8px 0 16px",lineHeight:1.5}}>{hasPin?"Enter the organizer PIN.":"One person runs the pool. Set a 4-number PIN."}</p><input inputMode="numeric" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} placeholder="PIN" onKeyDown={e=>e.key==="Enter"&&onUnlock(pin)} style={{background:"#eef2fc",border:`2px solid ${C.line}`,color:C.text,padding:"12px",fontSize:16,textAlign:"center",width:170}}/><div><button className="btn anton" onClick={()=>onUnlock(pin)} style={{background:`linear-gradient(135deg,${C.gold},#f0c14b)`,color:C.navy,padding:"11px 28px",fontSize:15,marginTop:14}}>{hasPin?"UNLOCK":"SET PIN"}</button></div></div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
